<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📱 D級出清品直購專區 (企業版)</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ==================================================================
           🍎 1. 全域樣式與深色模式變數 (CSS Variables)
           ================================================================== */
        :root {
            --radius-sm: 8px;
            --radius-lg: 12px;
            --h-std: 40px; 
            --blue: #007aff;
            --blue-hover: #0062cc;
            
            /* Light Theme - 🌟 強化對比版本 */
            --bg-body: #e5e5ea; /* 加深底板灰色，增強與純白卡片的對比 */
            --bg-card: #ffffff; 
            --bg-header: rgba(255, 255, 255, 0.85);
            --bg-input: #ffffff;
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            --border-light: rgba(0,0,0,0.12); /* 加深預設邊框 */
            --shadow-card: 0 4px 12px rgba(0,0,0,0.06), 0 2px 4px rgba(0,0,0,0.04);
            --shadow-hover: 0 0 0 1px var(--blue), 0 12px 28px rgba(0,122,255,0.15), 0 4px 12px rgba(0,0,0,0.08);
            --tag-brand-bg: #f2f2f7;
            
            --transition-spring: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.15);
            --transition-ease: 0.2s ease;
        }

        [data-theme="dark"] {
            /* Dark Theme - 🌟 強化對比版本 */
            --bg-body: #000000; /* 純黑底板 */
            --bg-card: #1c1c1e; /* 深灰卡片 */
            --bg-header: rgba(28, 28, 30, 0.85);
            --bg-input: #2c2c2e;
            --text-main: #f5f5f7;
            --text-muted: #98989d;
            --border-light: rgba(255,255,255,0.15); /* 更明顯的白線邊框 */
            --shadow-card: 0 4px 16px rgba(0,0,0,0.4), 0 2px 8px rgba(0,0,0,0.3);
            --shadow-hover: 0 0 0 1px var(--blue), 0 12px 28px rgba(10,132,255,0.25), 0 4px 12px rgba(0,0,0,0.5);
            --tag-brand-bg: #2c2c2e;
            --blue: #0a84ff; 
            --blue-hover: #007aff;
        }

        /* 全域美化捲軸 (Apple 風格 Scrollbar) */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(134, 134, 139, 0.4); border-radius: 6px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(134, 134, 139, 0.6); }
        [data-theme="dark"] ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); }
        [data-theme="dark"] ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.3); }

        *, *::before, *::after { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif; 
            background-color: var(--bg-body);
            padding: 20px; 
            color: var(--text-main); 
            margin: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            font-size: 14px;
            overflow-x: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        .container { 
            max-width: 1650px; 
            margin: auto; 
            padding: 0 0 40px 0; 
            position: relative;
        }

        /* ==================================================================
           🎯 2. Header & 搜尋/篩選列
           ================================================================== */
        .sticky-wrapper {
            position: sticky; top: 20px; z-index: 90; 
            background: var(--bg-header);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            margin: 0 0 24px 0; 
            padding: 20px 25px 15px;
            border: 1px solid var(--border-light); 
            border-radius: var(--radius-lg); 
            box-shadow: var(--shadow-card); 
        }

        @media (max-width: 768px) {
            body { padding: 12px; }
            .sticky-wrapper { top: 12px; padding: 16px 20px 12px; }
        }

        .header-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 16px; flex-wrap: wrap; gap: 12px;
        }

        h1 { font-size: 24px; color: var(--text-main); margin: 0; font-weight: 700; letter-spacing: -0.02em; }
        .sub-title { color: var(--text-muted); font-size: 13px; margin-top: 6px; font-weight: 500; }

        .header-actions { display: flex; gap: 10px; align-items: center; }

        input, select, button { box-sizing: border-box; font-family: inherit; }
        
        .search-bar { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
        
        .search-bar input#searchInput { 
            flex: 1; min-width: 200px; height: var(--h-std); border-radius: var(--radius-sm); 
            font-size: 15px;
            padding-left: 40px;
            background-color: var(--bg-input); border: 1px solid var(--border-light); color: var(--text-main); transition: all var(--transition-ease);
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="%2386868b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>');
            background-repeat: no-repeat; background-position: 14px center;
            background-size: 16px; 
        }
        .search-bar input#searchInput::placeholder { color: var(--text-muted); font-size: 14px; }
        .search-bar input#searchInput:focus { background-color: var(--bg-card); box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.3); border-color: var(--blue); outline: none; }

        .multiselect-container { position: relative; display: inline-block; flex: 1; min-width: 140px; max-width: 220px; }
        .multiselect-trigger {
            width: 100%; background: var(--bg-input); border: 1px solid var(--border-light); border-radius: var(--radius-sm); color: var(--text-main);          
            padding: 0 32px 0 16px; height: var(--h-std); display: flex; align-items: center; cursor: pointer;
            font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            position: relative; user-select: none; transition: background-color var(--transition-ease), transform 0.1s;
        }
        .multiselect-trigger:active { transform: scale(0.97); }
        .multiselect-trigger::after { content: "↕"; font-size: 12px; position: absolute; right: 12px; color: var(--text-muted); }

        .multiselect-options {
            visibility: hidden; opacity: 0; transform: scale(0.95) translateY(-5px); transform-origin: top center;
            transition: var(--transition-spring); pointer-events: none;
            position: absolute; top: calc(var(--h-std) + 6px); left: 0;
            background: var(--bg-card); 
            border: 1px solid var(--border-light); border-radius: var(--radius-lg);
            box-shadow: 0 12px 36px rgba(0,0,0,0.2); z-index: 100; width: 100%; padding: 6px; display: flex; flex-direction: column; gap: 4px;
        }
        .multiselect-options.show { visibility: visible; opacity: 1; transform: scale(1) translateY(0); pointer-events: auto; }

        .dropdown-search {
            width: 100%; padding: 8px 12px 8px 30px; border-radius: var(--radius-sm); border: none; background-color: rgba(0,0,0,0.05); color: var(--text-main);
            font-size: 13px; outline: none; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="%2386868b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>');
            background-repeat: no-repeat; background-position: 10px center; height: 34px;
        }
        [data-theme="dark"] .dropdown-search { background-color: rgba(255,255,255,0.08); }
        .dropdown-list { max-height: 220px; overflow-y: auto; border-top: 1px solid var(--border-light); padding-top: 4px; margin-top: 2px;}
        
        .multi-select-item {
            display: flex; align-items: center; justify-content: flex-start; gap: 8px; padding: 6px 8px; margin: 0; width: 100%;
            cursor: pointer; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; transition: background-color 0.1s; user-select: none; color: var(--text-main);
        }
        .multi-select-item:hover { background-color: var(--border-light); }
        .multi-select-item span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
        .select-all-item { color: var(--blue); font-weight: 600; margin-bottom: 2px;}

        /* ==================================================================
           🏷️ 3. 已選 Tags 與 數量統計顯示區
           ================================================================== */
        .sticky-footer {
            display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-top: 12px; min-height: 32px;
        }
        .active-filters-container { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; flex: 1; }
        .active-filter-tag {
            display: inline-flex; align-items: center; gap: 6px; background: var(--blue); color: #fff;
            padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600;
            animation: fadeIn 0.3s ease;
        }
        .active-filter-tag span { cursor: pointer; display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; background: rgba(0,0,0,0.2); border-radius: 50%; transition: background 0.2s;}
        .active-filter-tag span:hover { background: rgba(0,0,0,0.4); }
        .clear-filters-btn { font-size: 13px; color: var(--text-muted); cursor: pointer; font-weight: 600; text-decoration: underline; background: none; border: none; padding: 0 4px; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .summary-badge, .status-badge { 
            background: var(--bg-input); height: 32px; padding: 0 12px; border-radius: var(--radius-sm); 
            font-weight: 600; font-size: 13px; border: 1px solid var(--border-light); display: inline-flex; align-items: center; 
        }
        .summary-badge strong { color: var(--blue); margin: 0 6px; font-size: 14px;}
        .status-badge { color: var(--text-main); gap: 6px; }

        /* ==================================================================
           ✨ 4. 按鈕與通用元件
           ================================================================== */
        .mac-btn {
            display: inline-flex; align-items: center; justify-content: center; padding: 0 16px; border-radius: var(--radius-sm);
            height: var(--h-std); font-size: 14px; font-weight: 600; cursor: pointer; user-select: none; border: none;
            transition: transform 0.2s cubic-bezier(0.25, 0.8, 0.25, 1), background-color var(--transition-ease), opacity 0.2s;
        }
        .btn-sm {
            height: 32px !important;
            font-size: 13px !important;
            padding: 0 12px !important;
        }

        .mac-btn:active:not(:disabled) { transform: scale(0.96); }
        .btn-blue { background: var(--blue); color: #ffffff; }
        .btn-blue:hover:not(:disabled) { background: var(--blue-hover); }
        .btn-gray { background: var(--bg-input); border: 1px solid var(--border-light); color: var(--text-main); }
        .btn-gray:hover { background: var(--bg-body); }
        .btn-green { background: #34c759; color: #ffffff; }
        .btn-red { background: #ff3b30; color: #ffffff; }
        .btn-orange { background: #f59f00; color: #ffffff; }
        .btn-icon { width: var(--h-std); padding: 0; font-size: 16px; }

        /* ==================================================================
           ⚙️ 5. 固定於左上角的後台面板 (Floating Widget)
           ================================================================== */
        .admin-panel { 
            display: none; position: fixed; top: 20px; left: 20px; width: 340px; 
            background: var(--bg-header); backdrop-filter: saturate(180%) blur(25px); -webkit-backdrop-filter: saturate(180%) blur(25px); 
            border: 1px solid var(--border-light); box-shadow: 0 20px 50px rgba(0,0,0,0.3); 
            padding: 20px; border-radius: var(--radius-lg); z-index: 9999; font-size: 13px;
            animation: fadeIn 0.3s ease;
        }
        @media (max-width: 768px) {
            .admin-panel { top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 350px; }
        }

        .custom-file-upload {
            display: flex; gap: 8px; align-items: center; margin-bottom: 12px; 
            background: var(--bg-input); padding: 12px; border-radius: var(--radius-sm); 
            border: 1px dashed var(--text-muted); 
            transition: all 0.2s ease;
        }
        .custom-file-upload.drag-over {
            border-color: var(--blue);
            background-color: rgba(0, 122, 255, 0.1);
        }
        .custom-file-upload label { height: 28px; padding: 0 10px; font-size: 12px; border-radius: 6px; flex-shrink: 0; margin: 0; }
        .custom-file-upload span { font-size: 12px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }

        /* ==================================================================
           🖼️ 6. 商品卡與虛擬滾動排版 (固定 5 欄)
           ================================================================== */
        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 16px; 
        }

        @media (max-width: 480px) { 
            .multiselect-container { max-width: 100%; } 
            .sticky-footer { flex-direction: column; align-items: stretch; }
            .sticky-footer > div:last-child { justify-content: flex-end; width: 100%; display: flex; }
            .product-grid { grid-template-columns: 1fr; }
        }

        .product-card {
            background: var(--bg-card); border-radius: var(--radius-lg); padding: 20px; 
            display: flex; flex-direction: column; justify-content: space-between;
            border: 1px solid var(--border-light); 
            box-shadow: var(--shadow-card);
            transition: transform var(--transition-spring), box-shadow 0.3s ease, border-color 0.3s ease;
            height: 100%; 
        }
        .product-card:hover { transform: translateY(-4px); border-color: var(--blue); box-shadow: var(--shadow-hover); }

        .tag-group { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
        .tag { 
            font-size: 12px; padding: 4px 10px; border-radius: 6px; 
            font-weight: 600; color: #ffffff; 
            display: inline-flex; align-items: center; justify-content: center;
        }
        .tag-brand { background: var(--blue); } 
        .tag-level { background: #ff3b30; } 
        .tag-type { background: #34c759; } 
        
        .product-title { font-size: 16px; font-weight: 800; margin: 4px 0 14px; line-height: 1.45;}
        
        .product-specs { 
            font-size: 15px; color: var(--text-main); line-height: 1.8; 
            margin-bottom: 18px; border-top: 1px solid var(--border-light); padding-top: 14px;
        }
        .product-specs span.spec-label { font-weight: 700; color: var(--text-main); }
        .imei-display { font-family: "SF Mono", monospace; background: var(--bg-input); border: 1px solid var(--border-light); padding: 2px 6px; border-radius: 4px; font-size: 13px;}
        
        .scroll-sentinel { height: 40px; margin-top: 20px; display: flex; justify-content: center; align-items: center; color: var(--text-muted); grid-column: 1/-1;}
        .spinner { width: 24px; height: 24px; border: 3px solid var(--border-light); border-top-color: var(--blue); border-radius: 50%; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .sync-dot { width: 8px; height: 8px; background-color: #34c759; border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(0.8); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(0.8); opacity: 0.5; } }

        /* ==================================================================
           🛒 7. 側滑購物車 (Side Drawer) & Modals
           ================================================================== */
        .floating-cart {
            position: fixed; bottom: 30px; right: 30px; background: var(--blue); color: #ffffff;
            padding: 12px 24px; border-radius: 40px; box-shadow: 0 8px 24px rgba(0,122,255,0.4); 
            cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 700; 
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); z-index: 99;
        }
        .floating-cart:hover { transform: scale(1.05) translateY(-2px); background: var(--blue-hover); }
        .cart-badge { background: #ffffff; color: var(--blue); border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-size: 12px; }

        .drawer-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
            opacity: 0; visibility: hidden; transition: opacity 0.3s ease, visibility 0.3s ease; z-index: 10000;
        }
        .drawer-overlay.show { opacity: 1; visibility: visible; }

        .cart-drawer {
            position: fixed; top: 0; right: 0; bottom: 0; width: 100%; max-width: 440px; background: var(--bg-card); box-shadow: -10px 0 40px rgba(0,0,0,0.3);
            transform: translateX(100%); transition: transform var(--transition-spring); z-index: 10001; display: flex; flex-direction: column;
        }
        .cart-drawer.show { transform: translateX(0); }
        .drawer-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; border-bottom: 1px solid var(--border-light); }
        .drawer-header h2 { margin: 0; font-size: 20px; font-weight: 700; }
        .drawer-body { flex: 1; overflow-y: auto; padding: 20px 24px; }
        .drawer-footer { padding: 24px; border-top: 1px solid var(--border-light); background: var(--bg-body); position: relative; }
        
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid var(--border-light); }
        .cart-item:last-child { border-bottom: none; }
        .cart-item-title { font-weight: 800; font-size: 16px; margin-bottom: 6px; color: var(--text-main); } 
        .cart-item-imei { font-size: 14px; color: var(--text-main); line-height: 1.5; }
        .cart-drawer .imei-display { font-size: 14px; padding: 3px 6px; }

        .custom-select-container { position: relative; width: 100%; }
        .custom-select-trigger {
            width: 100%; background: var(--bg-card); border: 1px solid var(--border-light); border-radius: var(--radius-sm); color: var(--text-muted);          
            padding: 0 32px 0 12px; height: var(--h-std); display: flex; align-items: center; cursor: pointer;
            font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            position: relative; user-select: none; transition: background-color var(--transition-ease), border-color 0.2s;
        }
        .custom-select-trigger.has-value { color: var(--text-main); }
        .custom-select-trigger:active { transform: scale(0.98); }
        .custom-select-trigger::after { 
            content: ""; position: absolute; right: 14px; top: 50%; margin-top: -3px;
            border-width: 6px 5px 0 5px; border-style: solid; border-color: var(--text-muted) transparent transparent transparent;
            transition: transform 0.2s;
        }
        .custom-select-container.open .custom-select-trigger::after { transform: rotate(180deg); }

        .custom-select-options {
            visibility: hidden; opacity: 0; transform: scale(0.95) translateY(-5px); transform-origin: bottom center;
            transition: var(--transition-spring); pointer-events: none;
            position: absolute; bottom: calc(var(--h-std) + 6px); left: 0; 
            background: var(--bg-card); 
            border: 1px solid var(--border-light); border-radius: var(--radius-lg);
            box-shadow: 0 -10px 30px rgba(0,0,0,0.15); z-index: 100; width: 100%; padding: 6px; 
            display: flex; flex-direction: column; gap: 4px; max-height: none; overflow-y: visible; 
        }
        .custom-select-container.open .custom-select-options { visibility: visible; opacity: 1; transform: scale(1) translateY(0); pointer-events: auto; }
        .custom-select-item {
            padding: 10px 12px; margin: 0; width: 100%; border-radius: var(--radius-sm); 
            font-size: 15px; font-weight: 600; cursor: pointer; transition: background-color 0.1s, color 0.1s; color: var(--text-main);
        }
        .custom-select-item:hover { background-color: var(--border-light); }
        .custom-select-item.selected { background-color: var(--blue); color: #fff; }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 10000; justify-content: center; align-items: center; }
        .modal-content { background: var(--bg-card); width: 90%; max-width: 380px; border-radius: var(--radius-lg); padding: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); transform: scale(0.95); opacity: 0; animation: modalSpring 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.1) forwards; }
        @keyframes modalSpring { to { transform: scale(1); opacity: 1; } }
        
        #toastContainer { position: fixed; top: 30px; right: 30px; z-index: 10002; display: flex; flex-direction: column; gap: 12px; pointer-events: none; }
        .toast { 
            border-radius: var(--radius-lg); background: var(--bg-header); color: var(--text-main); border: 1px solid var(--border-light);
            backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px);
            padding: 16px 24px; box-shadow: 0 12px 32px rgba(0,0,0,0.15); font-size: 14px; font-weight: 600; 
            transform: translateY(-20px) scale(0.95); opacity: 0; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2); 
            pointer-events: auto; max-width: 350px; line-height: 1.5; 
        }
        .toast.show { transform: translateY(0) scale(1); opacity: 1; }
    </style>
</head>
<body>
    <div id="toastContainer"></div>

    <div class="container">
        <!-- 📌 吸頂區域包含 Header, 搜尋列, Tag區 與 商品數量狀態 -->
        <div class="sticky-wrapper">
            <div class="header-bar">
                <div>
                    <h1>📱 出清品直購專區 <span style="font-size: 14px; color: var(--blue); font-weight: normal; margin-left: 8px;">☁️ 企業雲端版</span></h1>
                    <div class="sub-title">本區僅限販售「D級出清品」，營運部-Tony 專屬管理</div>
                </div>
                <div class="header-actions">
                    <button class="mac-btn btn-gray btn-icon" id="themeToggle" onclick="toggleTheme()" title="切換深/淺色模式">🌙</button>
                    <button onclick="openAdminAuthModal()" class="mac-btn btn-gray" id="adminTriggerBtn">⚙️ 後台管理</button>
                </div>
            </div>

            <div class="search-bar">

                        <div class="custom-select-item" onclick="selectStore('桃園NOVA', event)">桃園NOVA</div>
                        <div class="custom-select-item" onclick="selectStore('中壢旗艦', event)">中壢旗艦</div>
                        <div class="custom-select-item" onclick="selectStore('中壢站前', event)">中壢站前</div>
                        <div class="custom-select-item" onclick="selectStore('中壢NOVA', event)">中壢NOVA</div>
                        <div class="custom-select-item" onclick="selectStore('新竹站前', event)">新竹站前</div>
                        <div class="custom-select-item" onclick="selectStore('台中站前', event)">台中站前</div>

                        <div class="custom-select-item" onclick="selectStore('東海NOVA', event)">東海NOVA</div>

    <script>
    // ==================================================================
    // 🔌 API 與核心變數
    // ==================================================================
    const SUPABASE_URL = "https://sobyyxxluxxkfslzkyhn.supabase.co"; 
    const SUPABASE_ANON_KEY = "sb_publishable_nv67PTR3o6_v2KPuFbBpbg_FPiN1IyR";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    const GOOGLE_FORM_SUBMIT_URL = "https://docs.google.com/forms/d/e/1FAIpQLSdtnqKY6LY4eDQOo57NZ76XYApCU1gZ3ttJEuI3EHQFr_7cA/formResponse";
    const FIELD_STORE = "entry.622983435", FIELD_CAT = "entry.570634756", FIELD_MODEL = "entry.732769472", FIELD_IMEI = "entry.112740061";        

    let allProducts = [], cart = [], filteredProductsCache = [];
    let selectedBrands = [], selectedSubCategories = [];
    
    const BATCH_SIZE = 30; 
    let currentRenderCount = 0;
    let scrollObserver = null;

    window.onload = function() {
        initTheme();
        checkLocalLoginState(); 
        loadSavedFilters(); 
        fetchProductsFromSupabase(); 
        
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') { closeAllDropdowns(); if (document.getElementById('cartDrawer').classList.contains('show')) toggleCartDrawer(); closeAdminAuthModal(); }
            if (e.key === 'Enter' && document.getElementById('adminAuthModal').style.display === 'flex') verifyAdminPassword();
        });
        document.addEventListener('click', closeAllDropdowns);
        setupIntersectionObserver();
        setupDragAndDrop();
    };

    function showToast(message, type = 'success') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerText = message;
        container.appendChild(toast);
        setTimeout(() => toast.classList.add('show'), 10);
        setTimeout(() => { toast.classList.remove('show'); toast.addEventListener('transitionend', () => toast.remove()); }, 3000);
    }

    // 更新檔案上傳顯示的檔名
    function updateFileName(inputElement) {
        const display = document.getElementById('fileNameDisplay');
        if (inputElement.files && inputElement.files.length > 0) {
            display.innerText = inputElement.files[0].name;
            display.style.color = 'var(--text-main)';
        } else {
            display.innerText = '未選擇檔案，或將檔案拖放至此';
            display.style.color = 'var(--text-muted)';
        }
    }

    /* -----------------------------------------------------------
       🌟 拖放上傳 (Drag and Drop) 邏輯
       ----------------------------------------------------------- */
    function setupDragAndDrop() {
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('excelFileInput');

        if (!dropZone || !fileInput) return;

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        });

        dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                fileInput.files = e.dataTransfer.files;
                updateFileName(fileInput);
            }
        });
    }

    /* -----------------------------------------------------------
       🌙 深色模式切換
       ----------------------------------------------------------- */
    function initTheme() {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            document.getElementById('themeToggle').innerText = '☀️';
        }
    }
    function toggleTheme() {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        if (isDark) {
            document.documentElement.removeAttribute('data-theme');
            localStorage.setItem('theme', 'light');
            document.getElementById('themeToggle').innerText = '🌙';
        } else {
            document.documentElement.setAttribute('data-theme', 'dark');
            localStorage.setItem('theme', 'dark');
            document.getElementById('themeToggle').innerText = '☀️';
        }
    }

    /* -----------------------------------------------------------
       🚀 篩選條件 localStorage & 標籤顯示區 (Active Filters)
       ----------------------------------------------------------- */
    function saveFiltersToLocal() {
        localStorage.setItem('savedBrands', JSON.stringify(selectedBrands));
        localStorage.setItem('savedSubCats', JSON.stringify(selectedSubCategories));
        renderActiveFilters();
    }
    function loadSavedFilters() {
        try {
            selectedBrands = JSON.parse(localStorage.getItem('savedBrands')) || [];
            selectedSubCategories = JSON.parse(localStorage.getItem('savedSubCats')) || [];
            renderActiveFilters();
        } catch(e) { console.error(e); }
    }

    function renderActiveFilters() {
        const container = document.getElementById('activeFiltersContainer');
        let html = '';
        
        selectedBrands.forEach(b => {
            html += `<div class="active-filter-tag">${b} <span onclick="removeFilter('brand', '${b}')">✕</span></div>`;
        });
        selectedSubCategories.forEach(s => {
            html += `<div class="active-filter-tag" style="background:#f59f00;">${s} <span onclick="removeFilter('subCategory', '${s}')">✕</span></div>`;
        });

        if (html !== '') html += `<button class="clear-filters-btn" onclick="clearAllFilters()">清除全部</button>`;
        container.innerHTML = html;
        updateFilterLabels();
    }

    function removeFilter(type, value) {
        if (type === 'brand') selectedBrands = selectedBrands.filter(b => b !== value);
        else selectedSubCategories = selectedSubCategories.filter(s => s !== value);
        saveFiltersToLocal(); resetPaginationAndFilter();
        renderBrandList(); renderSubCatList();
    }

    function clearAllFilters() {
        selectedBrands = []; selectedSubCategories = [];
        document.getElementById('searchInput').value = '';
        saveFiltersToLocal(); resetPaginationAndFilter();
        renderBrandList(); renderSubCatList();
    }

    /* -----------------------------------------------------------
       🖱️ 下拉選單互動邏輯
       ----------------------------------------------------------- */
    function toggleDropdown(id, event) {
        event.stopPropagation();
        const optionsDiv = document.getElementById(id);
        const isShowing = optionsDiv.classList.contains('show');
        closeAllDropdowns();
        if (!isShowing) {
            optionsDiv.classList.add('show');
            const searchInput = optionsDiv.querySelector('.dropdown-search');
            if (searchInput) { searchInput.value = ''; searchInput.focus(); }
            if (id === 'brandDropdownOptions') renderBrandList();
            if (id === 'subCategoryDropdownOptions') renderSubCatList();
        }
    }
    
    function toggleStoreDropdown(event) {
        event.stopPropagation();
        const container = document.getElementById('storeSelectContainer');
        const isOpen = container.classList.contains('open');
        closeAllDropdowns(); 
        if (!isOpen) {
            container.classList.add('open');
        }
    }

    // 門市單選切換
    function selectStore(storeName, event) {
        event.stopPropagation();
        document.getElementById('custStore').value = storeName;
        document.getElementById('storeSelectTrigger').innerText = storeName;
        document.getElementById('storeSelectTrigger').classList.add('has-value');
        
        document.querySelectorAll('#storeSelectOptions .custom-select-item').forEach(item => {
            item.classList.remove('selected');
            if (item.innerText === storeName) item.classList.add('selected');
        });
        
        document.getElementById('storeSelectContainer').classList.remove('open');
    }

    function closeAllDropdowns() { 
        document.querySelectorAll('.multiselect-options').forEach(opt => opt.classList.remove('show')); 
        const storeContainer = document.getElementById('storeSelectContainer');
        if(storeContainer) storeContainer.classList.remove('open');
    }

    function renderBrandList() {
        const keyword = document.getElementById('brandSearch').value.toLowerCase();
        const brands = [...new Set(allProducts.map(p => p.brand))].filter(Boolean).sort();
        const filtered = brands.filter(b => b.toLowerCase().includes(keyword));
        let html = '';
        filtered.forEach(b => {
            const isChecked = selectedBrands.includes(b);
            html += `<div class="multi-select-item" onclick="toggleSelection('brand', '${b}')"><input type="checkbox" ${isChecked ? 'checked' : ''}><span>${b}</span></div>`;
        });
        document.getElementById('brandList').innerHTML = html || '<div style="padding:10px; color:var(--text-muted); text-align:center;">無結果</div>';
        document.getElementById('brandSelectAll').checked = filtered.length > 0 && filtered.every(b => selectedBrands.includes(b));
    }

    function renderSubCatList() {
        const keyword = document.getElementById('subCatSearch').value.toLowerCase();
        const subCats = [...new Set(allProducts.map(p => p.subCategory))].filter(Boolean).sort();
        const filtered = subCats.filter(s => s.toLowerCase().includes(keyword));
        let html = '';
        filtered.forEach(s => {
            const isChecked = selectedSubCategories.includes(s);
            html += `<div class="multi-select-item" onclick="toggleSelection('subCategory', '${s}')"><input type="checkbox" ${isChecked ? 'checked' : ''}><span>${s}</span></div>`;
        });
        document.getElementById('subCatList').innerHTML = html || '<div style="padding:10px; color:var(--text-muted); text-align:center;">無結果</div>';
        document.getElementById('subCatSelectAll').checked = filtered.length > 0 && filtered.every(s => selectedSubCategories.includes(s));
    }

    function toggleSelection(type, value) {
        if (type === 'brand') {
            const idx = selectedBrands.indexOf(value);
            if (idx > -1) selectedBrands.splice(idx, 1); else selectedBrands.push(value);
            renderBrandList();
        } else {
            const idx = selectedSubCategories.indexOf(value);
            if (idx > -1) selectedSubCategories.splice(idx, 1); else selectedSubCategories.push(value);
            renderSubCatList();
        }
        saveFiltersToLocal(); resetPaginationAndFilter();
    }

    function toggleAll(type) {
        if (type === 'brand') {
            const keyword = document.getElementById('brandSearch').value.toLowerCase();
            const filtered = [...new Set(allProducts.map(p => p.brand))].filter(Boolean).filter(b => b.toLowerCase().includes(keyword));
            if (filtered.length > 0 && filtered.every(b => selectedBrands.includes(b))) selectedBrands = selectedBrands.filter(b => !filtered.includes(b));
            else filtered.forEach(b => { if (!selectedBrands.includes(b)) selectedBrands.push(b); });
            renderBrandList();
        } else {
            const keyword = document.getElementById('subCatSearch').value.toLowerCase();
            const filtered = [...new Set(allProducts.map(p => p.subCategory))].filter(Boolean).filter(s => s.toLowerCase().includes(keyword));
            if (filtered.length > 0 && filtered.every(s => selectedSubCategories.includes(s))) selectedSubCategories = selectedSubCategories.filter(s => !filtered.includes(s));
            else filtered.forEach(s => { if (!selectedSubCategories.includes(s)) selectedSubCategories.push(s); });
            renderSubCatList();
        }
        saveFiltersToLocal(); resetPaginationAndFilter();
    }

    function updateFilterLabels() {
        const brandTrigger = document.getElementById('brandTrigger');
        if (selectedBrands.length === 0) brandTrigger.innerText = "選擇品牌";
        else if (selectedBrands.length <= 2) brandTrigger.innerText = selectedBrands.join(', ');
        else brandTrigger.innerText = `${selectedBrands[0]}, ${selectedBrands[1]} +${selectedBrands.length - 2}`;

        const subCategoryTrigger = document.getElementById('subCategoryTrigger');
        if (selectedSubCategories.length === 0) subCategoryTrigger.innerText = "選擇小類";
        else if (selectedSubCategories.length <= 2) subCategoryTrigger.innerText = selectedSubCategories.join(', ');
        else subCategoryTrigger.innerText = `${selectedSubCategories[0]}, ${selectedSubCategories[1]} +${selectedSubCategories.length - 2}`;
    }

    /* -----------------------------------------------------------
       ⚡ 無限滾動載入機制 (Intersection Observer)
       ----------------------------------------------------------- */
    async function fetchProductsFromSupabase() {
        try {
            const { data, error } = await _supabase.from('products').select('*');
            if (error) throw error;
            allProducts = data || [];
            allProducts.sort((a, b) => (a.model || '').toString().localeCompare((b.model || '').toString(), 'zh-Hant'));
            resetPaginationAndFilter(); 
        } catch (err) { showToast("❌ 載入失敗！", "error"); }
    }

    function resetPaginationAndFilter() {
        const keyword = document.getElementById('searchInput').value.toLowerCase();
        filteredProductsCache = allProducts.filter(item => {
            const matchKeyword = item.model.toLowerCase().includes(keyword) || item.brand.toLowerCase().includes(keyword) || item.imei.toLowerCase().includes(keyword);
            const matchBrand = selectedBrands.length === 0 || selectedBrands.includes(item.brand);
            const matchSubCategory = selectedSubCategories.length === 0 || selectedSubCategories.includes(item.subCategory);
            return matchKeyword && matchBrand && matchSubCategory;
        });
        
        currentRenderCount = 0;
        document.getElementById('productGrid').innerHTML = ''; 
        document.getElementById('totalOnSale').innerText = filteredProductsCache.length;
        
        if (filteredProductsCache.length === 0) {
            document.getElementById('productGrid').innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 60px 20px; font-size: 15px;">找不到符合條件的商品。</div>';
            document.getElementById('scrollSentinel').style.display = 'none';
            return;
        }
        
        document.getElementById('scrollSentinel').style.display = 'flex';
        loadMoreProducts();
    }

    function setupIntersectionObserver() {
        const options = { root: null, rootMargin: '200px', threshold: 0.1 };
        scrollObserver = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && currentRenderCount < filteredProductsCache.length) {
                document.getElementById('loadingSpinner').style.display = 'block';
                document.getElementById('sentinelText').style.display = 'none';
                setTimeout(() => loadMoreProducts(), 100);
            }
        }, options);
        scrollObserver.observe(document.getElementById('scrollSentinel'));
    }

    function loadMoreProducts() {
        const grid = document.getElementById('productGrid');
        const fragment = document.createDocumentFragment();
        const nextBatch = filteredProductsCache.slice(currentRenderCount, currentRenderCount + BATCH_SIZE);
        
        nextBatch.forEach(item => {
            const card = document.createElement('div');
            card.className = 'product-card';
            let typeTagHTML = item.type !== '-' ? `<span class="tag tag-type">${item.type}</span>` : '';
            let levelTagHTML = item.level !== '-' ? `<span class="tag tag-level">${item.level} 級</span>` : '';
            const imeiHTML = item.imei ? `<span class="imei-display">${item.imei}</span>` : '無';
            
            card.innerHTML = `
                <div>
                    <div class="tag-group">
                        <span class="tag tag-brand">${item.brand}</span>
                        ${levelTagHTML}
                        ${typeTagHTML}
                    </div>
                    <div class="product-title">${item.model}</div>
                    <div class="product-specs">
                        <span class="spec-label">小類：</span>${item.subCategory}<br>
                        <span class="spec-label">電池：</span>${item.battery}<br>
                        <span class="spec-label">IMEI / SN：</span>${imeiHTML}
                    </div>
                </div>
                <div>
                    <button class="mac-btn btn-blue" style="width: 100%; border-radius: var(--radius-sm);" onclick="addToCart('${item.imei}')">放入購物車</button>
                </div>
            `;
            fragment.appendChild(card);
        });

        grid.appendChild(fragment);
        currentRenderCount += nextBatch.length;

        if (currentRenderCount >= filteredProductsCache.length) {
            document.getElementById('scrollSentinel').style.display = 'none';
        } else {
            document.getElementById('loadingSpinner').style.display = 'none';
            document.getElementById('sentinelText').style.display = 'block';
        }
    }

    /* -----------------------------------------------------------
       🛒 購物車 Drawer 與結帳
       ----------------------------------------------------------- */
    async function addToCart(imei) {
        if (cart.some(item => item.imei === imei)) { showToast('⚠️ 已在購物車中！', 'warning'); return; }
        try {
            const { data, error } = await _supabase.from('products').select('imei').eq('imei', imei).single();
            if (error || !data) {
                showToast('❌ 商品剛已被買走！', 'error');
                allProducts = allProducts.filter(p => p.imei !== imei); resetPaginationAndFilter(); return;
            }
        } catch (err) { showToast('⚠️ 連線失敗！', 'error'); return; }
        
        const product = allProducts.find(p => p.imei === imei);
        if (product) {
            cart.push(product); document.getElementById('cartCount').innerText = cart.length; 
            showToast(`🛒 已加入購物車！`);
            if (document.getElementById('cartDrawer').classList.contains('show')) renderCartItems();
        }
    }

    function removeFromCart(imei) {
        cart = cart.filter(item => item.imei !== imei); 
        document.getElementById('cartCount').innerText = cart.length; renderCartItems(); 
    }

    function toggleCartDrawer() {
        const drawer = document.getElementById('cartDrawer');
        const overlay = document.getElementById('cartDrawerOverlay');
        if (!drawer.classList.contains('show')) {
            renderCartItems(); drawer.classList.add('show'); overlay.classList.add('show'); document.body.style.overflow = 'hidden';
        } else {
            drawer.classList.remove('show'); overlay.classList.remove('show'); document.body.style.overflow = '';
        }
    }

    function renderCartItems() {
        const container = document.getElementById('cartItemsList');
        if (cart.length === 0) {
            container.innerHTML = `<div style="text-align: center; color: var(--text-muted); margin-top: 50px;">🛍️<br><br>購物車空空如也</div>`;
            return;
        }
        container.innerHTML = cart.map(item => {
            return `
                <div class="cart-item">
                    <div style="flex: 1; padding-right: 12px;">
                        <div class="cart-item-title">${item.model}</div>
                        <div class="cart-item-imei">IMEI / SN：<span class="imei-display">${item.imei}</span></div>
                    </div>
                    <div style="text-align: right;">
                        <button class="mac-btn btn-gray" style="height: 28px; font-size: 12px; border-radius: 6px;" onclick="removeFromCart('${item.imei}')">移除</button>
                    </div>
                </div>`;
        }).join('');
    }

    async function checkoutAndGenerateOrder() {
        if (cart.length === 0) { showToast('⚠️ 購物車內無商品！', 'warning'); return; }
        const selectedStore = document.getElementById('custStore').value;
        if (!selectedStore) { showToast('⚠️ 請選擇下單門市！', 'warning'); return; }
        const checkoutImeis = cart.map(item => item.imei);

        try {
            const { data: existingProducts, error: checkError } = await _supabase.from('products').select('imei').in('imei', checkoutImeis);
            if (checkError) throw checkError;
            
            // 🌟 核心防呆重置優化：若長度不符，代表有商品已被搶先買走
            if (existingProducts.length !== cart.length) {
                const existingImeis = existingProducts.map(p => p.imei);
                const soldOutItems = cart.filter(item => !existingImeis.includes(item.imei));
                let msg = '❌ 結帳失敗！以下商品已被買走，網頁將自動重新載入庫存：\n';
                soldOutItems.forEach(item => msg += `- ${item.model}\n`);
                showToast(msg, 'error');
                
                // 1. 清空購物車
                cart = []; 
                document.getElementById('cartCount').innerText = 0; 
                toggleCartDrawer(); 
                
                // 2. 自動向雲端撈取最新狀態，全面更新快取與商品網格
                fetchProductsFromSupabase(); 
                return; 
            }
        } catch (err) { showToast("⚠️ 連線失敗！", "error"); return; }

        const orderDate = new Date().toLocaleString('zh-TW');
        let ordersToInsert = []; 
        for (const item of cart) {
            const formData = new URLSearchParams();
            formData.append(FIELD_STORE, selectedStore); formData.append(FIELD_CAT, item.subCategory || "手機");                      
            formData.append(FIELD_MODEL, `${item.brand} ${item.model}`); formData.append(FIELD_IMEI, item.imei);                                          
            await fetch(GOOGLE_FORM_SUBMIT_URL, { method: 'POST', mode: 'no-cors', body: formData }).catch(e => console.error(e));
            ordersToInsert.push({ store: selectedStore, model: item.model, imei: item.imei });
        }

        try {
            const { error: orderError } = await _supabase.from('orders').insert(ordersToInsert);
            if (orderError) throw orderError;
            const { error: deleteError } = await _supabase.from('products').delete().in('imei', checkoutImeis);
            if (deleteError) throw deleteError;
            allProducts = allProducts.filter(p => !checkoutImeis.includes(p.imei));
            resetPaginationAndFilter();
        } catch (err) { showToast("⚠️ 雲端更新失敗！", "error"); return; }

        const orderRows = [['【D級出清品專區 - 抓貨通知單】'], ['下載日期：', orderDate], ['指定門市：', selectedStore], [''], ['商品門市', '品牌', '購買型號', '等級', '電池', 'IMEI序號']];
        cart.forEach(item => { orderRows.push([item.store, item.brand, item.model, item.level, item.battery, item.imei]); });
        const ws = XLSX.utils.aoa_to_sheet(orderRows); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "下貨明細");
        XLSX.writeFile(wb, `出清下貨單_${selectedStore}_${new Date().toISOString().slice(0,10)}.xlsx`);
        
        showToast(`🎉 訂單送出成功！`);
        cart = []; document.getElementById('cartCount').innerText = 0; toggleCartDrawer(); 
        
        document.getElementById('custStore').value = ''; 
        document.getElementById('storeSelectTrigger').innerText = '-- 請選擇門市 --';
        document.getElementById('storeSelectTrigger').classList.remove('has-value');
        document.querySelectorAll('#storeSelectOptions .custom-select-item').forEach(i => i.classList.remove('selected'));
    }

    /* -----------------------------------------------------------
       ⚙️ 後台管理與 Excel 處理邏輯
       ----------------------------------------------------------- */
    function openAdminAuthModal() {
        if (localStorage.getItem('admin_logged_in') === 'true') { 
            const panel = document.getElementById('adminPanel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block'; 
        } else { 
            document.getElementById('adminAuthModal').style.display = 'flex'; 
            setTimeout(() => document.getElementById('adminPasswordInput').focus(), 100); 
        }
    }
    function closeAdminAuthModal() { document.getElementById('adminAuthModal').style.display = 'none'; document.getElementById('adminPasswordInput').value = ''; }
    function verifyAdminPassword() {
        if (document.getElementById('adminPasswordInput').value === '8888') {
            localStorage.setItem('admin_logged_in', 'true'); document.getElementById('adminPanel').style.display = 'block'; closeAdminAuthModal(); showToast('🔓 權限解鎖！');
        } else { showToast('❌ 密碼錯誤！', 'error'); }
    }
    function checkLocalLoginState() { if (localStorage.getItem('admin_logged_in') === 'true') document.getElementById('adminPanel').style.display = 'block'; }
    function lockAdminPanel() { localStorage.removeItem('admin_logged_in'); document.getElementById('adminPanel').style.display = 'none'; showToast('🔒 已鎖定！', 'warning'); }
    function closeModalsOnOutsideClick(event, id) { if (event.target.id === id) document.getElementById(id).style.display = 'none'; }

    function handleFileRead() {
        const fileInput = document.getElementById('excelFileInput');
        if (!fileInput.files[0]) { showToast('⚠️ 請選擇庫存 Excel！', 'warning'); return; }
        const btn = document.getElementById('btnImportAndUpload'); btn.disabled = true; btn.innerText = "⏳ 正在解析庫存...";
        const reader = new FileReader();
        reader.onload = async function(e) {
            try {
                const data = new Uint8Array(e.target.result); const workbook = XLSX.read(data, { type: 'array' }); const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { range: 1 });
                let parsedList = [];
                jsonData.forEach(item => {
                    const type = (item['類型'] || item['Type'] || '').toString().trim(); const level = (item['等級'] || item['Level'] || '').toString().trim();
                    let price = parseFloat(item['設定售價'] || item['售價'] || item['價格'] || 0); if (isNaN(price)) price = 0;
                    if (type === '出清品' || level === 'D級') {
                        parsedList.push({
                            subCategory: (item['商品小類'] || item['小類'] || '-').toString().trim(), brand: (item['品牌'] || '其他').toString().trim(), model: (item['回收機款'] || item['機款'] || '未知型號').toString().trim(), imei: (item['IMEI'] || item['序號'] || '').toString().trim(), level: level || '-', store: (item['所在門市'] || item['門市'] || '未註記').toString().trim(), price: price, type: type || '-', battery: (item['電池健康度'] || item['電池'] || '-').toString().trim(), version: (item['國際版本'] || item['版本'] || '-').toString().trim()
                        });
                    }
                });
                if (parsedList.length === 0) { showToast('⚠️ 未偵測到符合商品！', 'warning'); btn.disabled = false; btn.innerText = "📥 1鍵匯入並覆蓋庫存"; return; }
                btn.innerText = "⏳ 正在覆蓋雲端...";
                const { error: deleteError } = await _supabase.from('products').delete().neq('id', 0); if (deleteError) throw deleteError;
                const { error: insertError } = await _supabase.from('products').insert(parsedList); if (insertError) throw insertError;
                showToast(`🎉 成功同步 ${parsedList.length} 筆商品！`, 'success'); fetchProductsFromSupabase(); 
                document.getElementById('fileNameDisplay').innerText = "未選擇檔案，或將檔案拖放至此"; 
                document.getElementById('fileNameDisplay').style.color = "var(--text-muted)";
            } catch (err) { showToast('❌ 同步失敗！', 'error'); } finally { btn.disabled = false; btn.innerText = "📥 1鍵匯入並覆蓋庫存"; fileInput.value = ''; }
        };
        reader.readAsArrayBuffer(fileInput.files[0]);
    }

    async function downloadOrdersOnlyNameAndImei() {
        try {
            let query = _supabase.from('orders').select('created_at, store, model, imei').order('created_at', { ascending: false });
            const startDate = document.getElementById('exportStartDate').value; const endDate = document.getElementById('exportEndDate').value;
            if (startDate) query = query.gte('created_at', `${startDate}T00:00:00`); if (endDate) query = query.lte('created_at', `${endDate}T23:59:59.999`);
            const { data: orderList, error } = await query;
            if (error) throw error;
            if (!orderList || orderList.length === 0) { showToast("⚠️ 此區間內無訂單紀錄！", "warning"); return; }
            const excelRows = [['下單時間', '指定門市', '品名', 'IMEI / 序號']];
            orderList.forEach(order => {
                let formattedTime = '無紀錄'; if (order.created_at) formattedTime = new Date(order.created_at).toLocaleString('zh-TW', { timeZone: 'Asia/Taipei' });
                excelRows.push([formattedTime, order.store || '未註記', order.model || '未知型號', order.imei || '無']);
            });
            const ws = XLSX.utils.aoa_to_sheet(excelRows); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "銷售出貨清單");
            const today = new Date().toISOString().slice(0, 10); let fileName = `歷史出貨報表_${today}.xlsx`;
            XLSX.writeFile(wb, fileName); showToast("🎉 成功導出歷史訂單！", "success");
        } catch (err) { showToast("❌ 讀取訂單失敗！", "error"); }
    }
